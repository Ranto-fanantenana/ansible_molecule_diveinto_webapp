---
dependency:
  name: galaxy
  options:
    ignore-certs: true
    ignore-errors: true
    role-file: molecule/default/requirements.yml
driver:
  name: docker
lint: |
  set -e
  yamllint -c molecule/default/.yamllint .
#ansible-lint -x meta-incorrect,meta-no-info,package-latest
platforms:
  - name: instance-centos
    image: "spurin/diveintoansible:centos_stream"
#    command: "/lib/systemd/systemd"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    pre_build_image: true
    privileged: true
    tty: true
  - name: instance-ubuntu
    image: "spurin/diveintoansible:ubuntu"
#    command: "/lib/systemd/systemd"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    pre_build_image: true
    privileged: true
    tty: true
provisioner:
  name: ansible
  config_options:
    defaults:
      role_name_check: 0
    connection:
      pipelining: true
  env:
    ANSIBLE_REMOTE_TMP: /tmp

verifier:
  name: ansible
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
